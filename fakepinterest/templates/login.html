<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>
        FakePinterest - Login
    </title> 
</head>
<body>
    <h1>Login</h1>
    <form method="POST">
        {{ form.csrf_token }}

        <div>{{ form.email.label() }} {{ form.email() }}</div>
        <div>{{ form.senha.label() }} {{ form.senha() }}</div>
        <div>{{ form.botao_confirmacao }}</div>
        <a href="{{ url_for('cadastro') }}">Criar Conta</a>
    </form>
</body>
</html>
